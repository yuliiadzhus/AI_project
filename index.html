<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelAI | Global Budget Guide</title>
    <!-- Підключаємо Montserrat: елегантний та сучасний -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="navbar">
            <div class="brand-group">
                <div class="brand">
                    <svg class="planet-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    </svg>
                    <span class="logo-text">Travel<span>AI</span></span>
                </div>
                <p class="brand-description">Твій інтелектуальний помічник для бюджетних мандрівок</p>
            </div>
            <div class="engine-info">V2.5 FLASH ENGINE</div>
        </header>

        <main class="grid-layout">
            <!-- Ліва панель -->
            <section class="glass-panel side-panel">
                <div class="panel-header">
                    <span class="label">Analysis</span>
                    <h2>Бюджетний аналіз</h2>
                    <p class="panel-desc">Шукайте безкоштовні локації світу</p>
                </div>
                
                <div class="input-block">
                    <div class="input-wrapper">
                        <input type="text" id="userInput" placeholder="Куди прямуємо?" autocomplete="off">
                        <div class="focus-border"></div>
                    </div>
                </div>

                <button id="analyzeBtn" class="azure-button">
                    <span>Скласти маршрут</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>

                <div class="keyword-tags">
                    <span>Безкоштовно</span>
                    <span>Локально</span>
                    <span>Економно</span>
                </div>

                <div id="loader" class="loading-state">
                    <div class="progress-track"><div class="progress-fill"></div></div>
                    <span>Синхронізація з Gemini 2.5...</span>
                </div>
            </section>

            <!-- Права панель -->
            <section class="glass-panel main-panel">
                <div class="panel-header">
                    <span class="label">Intelligence</span>
                    <h2>Рекомендації гіда</h2>
                </div>
                <div id="output" class="result-view">
                    <div class="empty-view">Система готова. Оберіть місто для старту.</div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
